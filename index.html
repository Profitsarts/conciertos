<style>
  :root{
    --ink:#101243;          /* deep ultramarine background */
    --ink-2:#181b58;        /* raised surface */
    --ink-3:#22266e;        /* borders / hover */
    --paper:#F5EFDC;        /* warm paper foreground */
    --paper-dim:#a9aed9;    /* secondary text */
    --yellow:#FFCC33;       /* poster yellow: gratis + accents */
    --coral:#FF5D5D;        /* today marker */
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Archivo',system-ui,sans-serif;
    font-size:15px;
    line-height:1.45;
    min-height:100vh;
  }
  /* ---------- top bar ---------- */
  header{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--ink) 82%, rgba(16,18,67,0));
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
  }
  .masthead{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:8px}
  .brand img{width:22px;height:22px;flex:none}
  h1{
    font-family:'Archivo',sans-serif;
    font-weight:400;
    font-size:clamp(22px,6vw,30px);
    letter-spacing:-.01em;
    text-transform:uppercase;
    line-height:1;
  }
  h1 span{color:var(--yellow)}
  .status{
    font-size:11px;color:var(--paper-dim);
    display:flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--paper-dim);flex:none}
  .dot.live{background:#5ad17a}
  .dot.offline{background:var(--coral)}
  button.refresh{
    background:none;border:1px solid var(--ink-3);color:var(--paper-dim);
    border-radius:6px;padding:3px 8px;font:inherit;font-size:11px;cursor:pointer;
  }
  button.refresh:active{color:var(--paper)}
  /* ---------- filters ---------- */
  .filters{display:flex;gap:8px;margin-top:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .filters::-webkit-scrollbar{display:none}
  .chip{
    flex:none;background:var(--ink-2);border:1px solid var(--ink-3);color:var(--paper-dim);
    border-radius:999px;padding:6px 14px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;
  }
  .chip[aria-pressed="true"]{background:var(--paper);border-color:var(--paper);color:var(--ink)}
  .chip.free[aria-pressed="true"]{background:var(--yellow);border-color:var(--yellow)}
  .row2{display:flex;gap:8px;margin-top:8px}
  select,input[type="search"]{
    background:var(--ink-2);border:1px solid var(--ink-3);color:var(--paper);
    border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;min-width:0;
  }
  select{flex:none}
  input[type="search"]{flex:1}
  input::placeholder{color:var(--paper-dim)}
  select:focus,input:focus,button:focus-visible{outline:2px solid var(--yellow);outline-offset:1px}
  /* ---------- list ---------- */
  main{padding:4px 16px calc(env(safe-area-inset-bottom) + 48px);max-width:720px;margin:0 auto}
  .month-h{
    font-family:'Archivo Black',sans-serif;text-transform:uppercase;
    font-size:13px;letter-spacing:.24em;color:var(--paper-dim);
    margin:26px 0 10px;display:flex;align-items:center;gap:12px;
  }
  .month-h::after{content:"";flex:1;height:1px;background:var(--ink-3)}
  .day{display:flex;gap:12px;margin-bottom:14px}
  /* signature: ticket-stub day rail */
  .stub{
    flex:none;width:54px;text-align:center;align-self:stretch;
    background:var(--ink-2);border-radius:var(--radius);
    border-right:2px dotted var(--ink);
    padding:8px 0 6px;
    display:flex;flex-direction:column;justify-content:flex-start;gap:0;
  }
  .stub .dow{font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--paper-dim);text-transform:uppercase}
  .stub .num{font-family:'Archivo Black',sans-serif;font-size:24px;line-height:1.1}
  .day.today .stub{background:var(--coral);border-right-color:var(--ink)}
  .day.today .stub .dow,.day.today .stub .num{color:var(--ink)}
  .day.today .stub .dow::after{content:" · hoy"}
  .events{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
  .ev{
    background:var(--ink-2);border:1px solid transparent;border-radius:var(--radius);
    padding:10px 12px;
  }
  .ev .name{font-weight:700;font-size:15px}
  .ev .meta{color:var(--paper-dim);font-size:13px;margin-top:2px;display:flex;flex-wrap:wrap;gap:4px 10px;align-items:baseline}
  .venue{text-transform:capitalize}
  .price{font-weight:600;color:var(--paper)}
  .tag-free{
    display:inline-block;background:var(--yellow);color:var(--ink);
    font-size:10px;font-weight:800;letter-spacing:.08em;border-radius:4px;
    padding:1px 6px;text-transform:uppercase;vertical-align:1px;
  }
  .cycle{color:var(--paper-dim);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .empty{
    text-align:center;color:var(--paper-dim);padding:56px 20px;font-size:14px;
  }
  .empty strong{color:var(--paper);display:block;font-size:16px;margin-bottom:6px}
  .fade{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.fade{animation:none}}
  @media(min-width:600px){body{font-size:16px}.ev .name{font-size:16px}}
</style>

<body>
<header>
  <div class="masthead">
    <div class="brand">
      <img src="mpc-icon-coral.png" alt="" width="22" height="22">
      <h1>Conciertos <span>Asturias</span></h1>
    </div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusTxt">Cargando…</span>
      <button class="refresh" id="btnRefresh" type="button">↻ Actualizar</button>
    </div>
  </div>
  <div class="filters" role="group" aria-label="Vista">
    <button class="chip" data-view="hoy" aria-pressed="false" type="button">Hoy</button>
    <button class="chip" data-view="finde" aria-pressed="false" type="button">Finde</button>
    <button class="chip" data-view="proximos" aria-pressed="true" type="button">Próximos</button>
    <button class="chip" data-view="todo" aria-pressed="false" type="button">Todo</button>
    <button class="chip free" id="btnFree" aria-pressed="false" type="button">Solo gratis</button>
  </div>
  <div class="row2">
    <select id="selVenue" aria-label="Filtrar por sala"><option value="">Todas las salas</option></select>
    <input type="search" id="inpSearch" placeholder="Buscar grupo, sala, festival…" aria-label="Buscar">
  </div>
</header>
<main id="list" class="fade"></main>

<script>
/* ================= CONFIG ================= */
const DOC_URL = "https://docs.google.com/document/d/1EAe-TBDskDMQcGsqYwkKPSd0_q780HxA1zDJBkoz65c/export?format=txt";
const PROXIES = [
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u),
];
const REFRESH_MS = 30 * 60 * 1000; // 30 min

const MONTHS = {ENERO:0,FEBRERO:1,MARZO:2,ABRIL:3,MAYO:4,JUNIO:5,JULIO:6,AGOSTO:7,SEPTIEMBRE:8,OCTUBRE:9,NOVIEMBRE:10,DICIEMBRE:11};
const MONTH_NAMES = Object.keys(MONTHS);
const DOW = {L:"lun",M:"mar",X:"mié",J:"jue",V:"vie",S:"sáb",D:"dom"};

/* ================= PARSER ================= */
function parseDoc(text){
  const events = [];
  const now = new Date();
  let month = null;
  for (let raw of text.split(/\n+/)){
    const line = raw.trim();
    if (!line) continue;
    const up = line.toUpperCase();
    if (MONTHS.hasOwnProperty(up)) { month = MONTHS[up]; continue; }
    const m = line.match(/^([LMXJVSD])(\d{1,2})\s+(.+)$/);
    if (!m || month === null) continue;
    const day = parseInt(m[2],10);
    let rest = m[3].trim();

    // venue: last (...) group that appears BEFORE any € sign (else last one)
    let venue = null;
    const euroIdx = rest.indexOf("€");
    const parens = [...rest.matchAll(/\(([^()]*)\)/g)];
    const candidates = euroIdx >= 0 ? parens.filter(p => p.index < euroIdx) : parens;
    if (candidates.length){
      const p = candidates[candidates.length-1];
      venue = p[1].trim();
      rest = (rest.slice(0, p.index) + rest.slice(p.index + p[0].length)).trim();
    }
    // time: first hh:mm anywhere
    let time = null;
    const t = rest.match(/(\d{1,2}:\d{2})/);
    if (t){ time = t[1]; rest = (rest.slice(0, t.index) + rest.slice(t.index + t[0].length)).trim(); }
    // price
    let price = null;
    if (/\bGRATIS\b/i.test(rest)){
      price = "GRATIS";
      rest = rest.replace(/\/?\s*\bGRATIS\b/i,"").trim();
    } else {
      const eu = rest.search(/(?:\d[\d.,]*(?:\s*(?:a|\/|-)\s*\d[\d.,]*)?\s*€)/);
      if (eu >= 0){
        // price starts at the last separator before the € amount (captures "entrada de dia 8€")
        const before = rest.slice(0, eu);
        const sep = Math.max(before.lastIndexOf(" / "), before.lastIndexOf(" - "), before.lastIndexOf(" – "));
        const start = sep >= 0 ? sep + 3 : eu;
        price = rest.slice(start).trim();
        rest = rest.slice(0, sep >= 0 ? sep : eu).trim();
      }
    }
    // clean stray separators left in the name
    rest = rest.replace(/[\/\-–·,]+$/,"").replace(/^[\/\-–·,]+/,"").replace(/\s{2,}/g," ").trim();
    // cycle/festival prefix: "Festival x: artist"
    let cycle = null;
    const c = rest.match(/^([^:]{3,40}):\s*(.+)$/);
    if (c && !/^\d/.test(c[2])){ cycle = c[1].trim(); rest = c[2].trim(); }

    // year inference: doc runs forward from "now"; months far behind belong to next year
    let year = now.getFullYear();
    if (month < now.getMonth() - 6) year += 1;

    const date = new Date(year, month, day);
    events.push({
      date, month, day,
      dow: m[1],
      name: rest,
      venue, time, price, cycle,
      free: !!(price && /gratis/i.test(price)),
      raw: line
    });
  }
  events.sort((a,b)=>a.date-b.date || (a.time||"99").localeCompare(b.time||"99"));
  return events;
}

/* ============ FETCH (live doc) ============ */
function sanitize(text){
  return text.replace(/[ ​-‍﻿]/g," ");
}

async function fetchDoc(){
  for (const proxy of PROXIES){
    try{
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort(), 6000);
      const res = await fetch(proxy(DOC_URL), {cache:"no-store", signal:ctrl.signal});
      clearTimeout(t);
      if (!res.ok) continue;
      const text = sanitize(await res.text());
      const evs = parseDoc(text);
      if (evs.length > 5) return evs; // sanity check
    }catch(e){ /* try next proxy */ }
  }
  return null;
}

/* ================= STATE ================= */
let allEvents = [];
let view = "proximos";
let freeOnly = false;
let venueFilter = "";
let query = "";
let live = false;
let lastUpdate = null;

/* ================= RENDER ================= */
const $ = s => document.querySelector(s);
const list = $("#list");

function startOfDay(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }

function weekendRange(today){
  // Fri–Sun containing/next from today
  const d = startOfDay(today);
  const dow = d.getDay(); // 0=Sun
  let fri = new Date(d);
  if (dow === 0) fri.setDate(d.getDate()-2);
  else fri.setDate(d.getDate() + (5 - dow));
  const sun = new Date(fri); sun.setDate(fri.getDate()+2);
  return [fri, sun];
}

function filtered(){
  const today = startOfDay(new Date());
  let evs = allEvents;
  if (view === "hoy") evs = evs.filter(e => startOfDay(e.date).getTime() === today.getTime());
  else if (view === "finde"){
    const [f,s] = weekendRange(today);
    evs = evs.filter(e => e.date >= f && e.date <= new Date(s.getTime()+86399999) && e.date >= today);
  }
  else if (view === "proximos") evs = evs.filter(e => startOfDay(e.date) >= today);
  if (freeOnly) evs = evs.filter(e => e.free);
  if (venueFilter) evs = evs.filter(e => (e.venue||"").toLowerCase() === venueFilter);
  if (query){
    const q = query.toLowerCase();
    evs = evs.filter(e => e.raw.toLowerCase().includes(q));
  }
  return evs;
}

function render(){
  const evs = filtered();
  const today = startOfDay(new Date()).getTime();
  list.classList.remove("fade"); void list.offsetWidth; list.classList.add("fade");

  if (!evs.length){
    list.innerHTML = '<div class="empty"><strong>Nada por aquí</strong>Prueba otra vista o quita algún filtro.</div>';
    return;
  }
  let html = "", curMonth = -1, curDay = null;
  for (const e of evs){
    const key = e.month + "-" + e.day;
    if (e.month !== curMonth){
      if (curDay) { html += "</div></div>"; curDay = null; }
      curMonth = e.month;
      html += `<div class="month-h">${MONTH_NAMES[e.month].toLowerCase()}</div>`;
    }
    if (key !== curDay){
      if (curDay) html += "</div></div>";
      curDay = key;
      const isToday = startOfDay(e.date).getTime() === today;
      html += `<div class="day${isToday?" today":""}">
        <div class="stub"><span class="dow">${DOW[e.dow]||e.dow}</span><span class="num">${e.day}</span></div>
        <div class="events">`;
    }
    html += `<div class="ev">
      <div class="name">${esc(e.name)}${e.free?' <span class="tag-free">Gratis</span>':""}</div>
      <div class="meta">
        ${e.cycle?`<span class="cycle">${esc(e.cycle)}</span>`:""}
        ${e.venue?`<span class="venue">${esc(e.venue)}</span>`:""}
        ${e.time?`<span>${e.time}</span>`:""}
        ${e.price && !e.free?`<span class="price">${esc(e.price)}</span>`:""}
      </div>
    </div>`;
  }
  if (curDay) html += "</div></div>";
  list.innerHTML = html;
}

function esc(s){ return s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function renderVenues(){
  const counts = {};
  for (const e of allEvents){ if (e.venue) counts[e.venue.toLowerCase()] = (counts[e.venue.toLowerCase()]||0)+1; }
  const opts = Object.entries(counts).sort((a,b)=>b[1]-a[1])
    .map(([v,n]) => `<option value="${esc(v)}">${esc(v)} (${n})</option>`).join("");
  $("#selVenue").innerHTML = '<option value="">Todas las salas</option>' + opts;
}

function setStatus(){
  const dot = $("#dot"), txt = $("#statusTxt");
  dot.className = "dot " + (live ? "live" : "offline");
  if (lastUpdate){
    const mins = Math.round((Date.now()-lastUpdate)/60000);
    txt.textContent = (live ? "Doc en vivo" : "Copia local") + " · " + (mins<1?"ahora":`hace ${mins} min`);
  } else txt.textContent = live ? "Doc en vivo" : "Copia local";
}

/* ================= BOOT ================= */
async function refresh(manual){
  $("#statusTxt").textContent = "Actualizando…";
  const evs = await fetchDoc();
  if (evs && evs.length >= allEvents.length){ allEvents = evs; live = true; }
  else if (!allEvents.length){ allEvents = parseDoc(SNAPSHOT); live = false; }
  else live = false;
  lastUpdate = Date.now();
  renderVenues(); render(); setStatus();
}

document.querySelectorAll(".chip[data-view]").forEach(b=>{
  b.addEventListener("click", ()=>{
    document.querySelectorAll(".chip[data-view]").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    view = b.dataset.view; render();
  });
});
$("#btnFree").addEventListener("click", e=>{
  freeOnly = !freeOnly;
  e.currentTarget.setAttribute("aria-pressed", String(freeOnly));
  render();
});
$("#selVenue").addEventListener("change", e=>{ venueFilter = e.target.value; render(); });
$("#inpSearch").addEventListener("input", e=>{ query = e.target.value.trim(); render(); });
$("#btnRefresh").addEventListener("click", ()=>refresh(true));
setInterval(setStatus, 60000);
setInterval(()=>refresh(false), REFRESH_MS);
